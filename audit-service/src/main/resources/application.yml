server:
  port: 8086

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5437/audit_db
    username: audit_user
    password: audit_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: audit-service
    producer:
      client-id: audit-service

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

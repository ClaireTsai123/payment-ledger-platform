server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: account-service
              uri: http://localhost:8082
              predicates:
                - Path=/accounts/**
            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/payments/**
            - id: ledger-service
              uri: http://localhost:8084
              predicates:
                - Path=/ledger/**
            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/notifications/**
            - id: audit-service
              uri: http://localhost:8086
              predicates:
                - Path=/audit/**

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
